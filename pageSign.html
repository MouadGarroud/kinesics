<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kinesics — Basic Signs</title>
  <link rel="stylesheet" href="./dist/style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    h1, h2, h3 { font-family: 'DM Serif Display', serif; }
    .arabic-text { font-family: 'Cairo', sans-serif; }

    .sign-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }
    .sign-card:hover {
      transform: scale(1.05);
      box-shadow: 0 16px 32px rgba(0,0,0,0.10);
    }
    .hand-bg { background: linear-gradient(135deg, #fef9c3, #fde68a); }
  </style>
</head>
<body class="bg-white text-stone-800 flex flex-col min-h-screen">

  <div id="navbar-placeholder"></div>

  <main class="flex-1">
    <section class="bg-amber-50 border-b border-amber-100 py-14 px-6 text-center">
      <span class="text-xs font-semibold uppercase tracking-widest text-amber-600">Everyday Communication</span>
      <h1 class="text-4xl md:text-5xl mt-3 text-stone-900">Basic Signs</h1>
      <p class="text-stone-500 mt-3 max-w-sm mx-auto text-sm leading-relaxed">Learn essential everyday signs to start communicating right away. Click any card to see how it's done.</p>
    </section>

    <section class="max-w-6xl mx-auto px-6 py-16">
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6" id="signs-grid">
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <div id="modal-overlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full p-8 relative">
      <button id="modal-close" class="absolute top-4 right-4 w-9 h-9 flex items-center justify-center rounded-full bg-stone-100 hover:bg-stone-200 transition-colors text-stone-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>

      <div class="text-center mb-6">
        <div id="modal-icon" class="text-5xl mb-3"></div>
        <div id="modal-title" class="text-3xl font-bold text-stone-900 mb-1" style="font-family:'DM Serif Display',serif;"></div>
        <p id="modal-category" class="text-xs text-amber-600 font-semibold uppercase tracking-wider"></p>
      </div>

      <div class="hand-bg rounded-2xl h-40 flex flex-col items-center justify-center mb-6 border border-amber-200">
        <div id="modal-hand" class="text-5xl mb-2"></div>
      </div>

      <div class="bg-stone-50 rounded-xl p-4 relative">
        <div class="flex justify-between items-center mb-3">
          <p class="text-xs font-semibold text-stone-500 uppercase tracking-wider">How to sign it</p>
          <button id="modal-lang-toggle" class="text-xs font-semibold px-3 py-1 bg-stone-200 text-stone-600 rounded-full hover:bg-amber-100 hover:text-amber-700 transition-colors">
            Translate to Arabic
          </button>
        </div>
        <p id="modal-description" class="text-sm text-stone-700 leading-relaxed"></p>
      </div>

      <div id="modal-tip-wrap" class="mt-3 hidden">
        <div class="bg-amber-50 border border-amber-100 rounded-xl px-4 py-3">
          <p class="text-xs text-amber-700 font-semibold uppercase tracking-wider mb-1">💡 Tip / نصيحة</p>
          <p id="modal-tip" class="text-xs text-amber-800 leading-relaxed"></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const signs = [
      {
        word: 'Hello', emoji: '👋', hand: '🖐', category: 'Greeting',
        descEN: 'Open your dominant hand and place your fingertips near your forehead, then move your hand outward and to the side, like a salute.',
        descAR: 'افتح يدك المهيمنة وضع أطراف أصابعك بالقرب من جبهتك، ثم حرك يدك للخارج وإلى الجانب، كأنك تؤدي تحية.',
        tipEN: 'Think of it as a relaxed military salute — a friendly wave from the forehead.',
        tipAR: 'تخيلها كتحية عسكرية هادئة — تلويحة ودية تنطلق من الجبهة.'
      },
      {
        word: 'Goodbye', emoji: '👋', hand: '✌️', category: 'Farewell',
        descEN: 'Extend your fingers and fold them down into your palm repeatedly, like a waving motion.',
        descAR: 'مد أصابعك واطوها للأسفل نحو راحة يدك بشكل متكرر، وكأنك تلوح.',
        tipEN: 'Keep the movement relaxed and natural. Multiple waves make it more emphatic.',
        tipAR: 'حافظ على الحركة هادئة وطبيعية. التلويح المتعدد يجعلها أكثر تأكيداً.'
      },
      {
        word: 'Thank You', emoji: '🙏', hand: '🤚', category: 'Politeness',
        descEN: 'Bring the fingertips of your flat hand to your chin, then move the hand forward and slightly downward away from your face.',
        descAR: 'قرّب أطراف أصابع يدك المفتوحة إلى ذقنك، ثم حرك يدك للأمام وللأسفل قليلاً بعيداً عن وجهك.',
        tipEN: 'The motion is like "blowing a kiss of gratitude" from your chin outward.',
        tipAR: 'الحركة تشبه "إرسال قبلة امتننان" من ذقنك للخارج.'
      },
      {
        word: 'Please', emoji: '🙏', hand: '✋', category: 'Politeness',
        descEN: 'Place your flat, open hand on your chest and rub it in a circular motion.',
        descAR: 'ضع يدك المفتوحة والمسطحة على صدرك وافركها بحركة دائرية.',
        tipEN: 'Always use a warm facial expression — in sign language, expression carries meaning.',
        tipAR: 'استخدم دائماً تعابير وجه ودية — في لغة الإشارة، التعابير تحمل معنى.'
      },
      {
        word: 'Sorry', emoji: '😔', hand: '✊', category: 'Emotion',
        descEN: 'Make a fist with your dominant hand and rub it in a circular motion over your chest (heart area).',
        descAR: 'اصنع قبضة بيدك المهيمنة وافركها بحركة دائرية على صدرك (منطقة القلب).',
        tipEN: 'A sincere facial expression makes this sign more meaningful and natural.',
        tipAR: 'تعبيرات الوجه الصادقة تجعل هذه الإشارة أكثر معنى وطبيعية.'
      },
      {
        word: 'Yes', emoji: '✅', hand: '✊', category: 'Response',
        descEN: 'Make a fist with your dominant hand and nod it up and down, mimicking a head nod.',
        descAR: 'اصنع قبضة بيدك المهيمنة وحركها للأعلى والأسفل، مقلداً إيماءة الرأس للموافقة.',
        tipEN: 'Nodding your head simultaneously reinforces the sign.',
        tipAR: 'هز رأسك بالموافقة في نفس الوقت يعزز الإشارة.'
      },
      {
        word: 'No', emoji: '❌', hand: '✌️', category: 'Response',
        descEN: 'Extend your index and middle fingers then quickly snap them to your thumb, like a two-fingered snap — done twice.',
        descAR: 'مد إصبعي السبابة والوسطى ثم اضممهما بسرعة إلى إبهامك، مرتين متتاليتين.',
        tipEN: 'A slight shake of the head at the same time makes the sign clearer.',
        tipAR: 'هز الرأس قليلاً بالرفض في نفس الوقت يجعل الإشارة أوضح.'
      },
      {
        word: 'Help', emoji: '🆘', hand: '🤲', category: 'Action',
        descEN: 'Place one hand open and flat (palm up). With the other hand, make a thumbs-up and place it on the flat palm, then lift both hands upward together.',
        descAR: 'افتح إحدى يديك بحيث تواجه راحة اليد الأعلى. باليد الأخرى، ارفع إبهامك وضعه على راحة اليد المفتوحة، ثم ارفع كلتا يديك معاً للأعلى.',
        tipEN: 'The flat hand represents "support" being lifted — helping someone up.',
        tipAR: 'اليد المسطحة تمثل "الدعم" الذي يتم رفعه — مساعدة شخص على النهوض.'
      },
      {
        word: 'Love', emoji: '❤️', hand: '🤗', category: 'Emotion',
        descEN: 'Cross both arms over your chest, hands closed in fists — as if hugging yourself.',
        descAR: 'قم بتصليب ذراعيك على صدرك مع إغلاق يديك على شكل قبضتين — وكأنك تعانق نفسك.',
        tipEN: 'A warm smile and the body language of a hug make this sign feel complete.',
        tipAR: 'ابتسامة دافئة ولغة الجسد الخاصة بالعناق تجعل هذه الإشارة مكتملة.'
      },
      {
        word: 'Eat / Food', emoji: '🍽️', hand: '🤌', category: 'Daily Life',
        descEN: 'Bring the fingertips of your dominant hand together and repeatedly move them to your mouth, as if putting food in.',
        descAR: 'اجمع أطراف أصابع يدك المهيمنة وحركها مراراً نحو فمك، وكأنك تضع طعاماً فيه.',
        tipEN: 'This sign can mean both "eat" and "food" depending on context.',
        tipAR: 'هذه الإشارة قد تعني "يأكل" أو "طعام" بناءً على السياق.'
      },
      {
        word: 'Water', emoji: '💧', hand: '🤟', category: 'Daily Life',
        descEN: 'Make the letter "W" handshape (three fingers up) and tap it to your chin twice.',
        descAR: 'قم بتشكيل حرف "W" بيدك (رفع ثلاثة أصابع) واطرق بها بلطف على ذقنك مرتين.',
        tipEN: 'The "W" handshape stands for the English word "Water".',
        tipAR: 'شكل اليد "W" يرمز لكلمة "Water" بالإنجليزية.'
      },
      {
        word: 'Where?', emoji: '❓', hand: '☝️', category: 'Question',
        descEN: 'Point your index finger upward and shake it side to side with a questioning facial expression.',
        descAR: 'أشر بإصبعك السبابة للأعلى وحركه من جانب لآخر مع إظهار تعبير وجه متسائل.',
        tipEN: 'Facial expressions are essential — raise your eyebrows to signal a question.',
        tipAR: 'تعبيرات الوجه ضرورية — ارفع حاجبيك للإشارة إلى أنك تسأل.'
      },
    ];

    const grid = document.getElementById('signs-grid');
    signs.forEach(item => {
      const card = document.createElement('div');
      card.className = 'sign-card bg-stone-50 border border-stone-100 rounded-2xl p-5 flex flex-col items-center gap-3 select-none';
      card.innerHTML = `
        <span class="text-3xl">${item.emoji}</span>
        <div class="text-center">
          <p class="font-semibold text-stone-800 text-sm">${item.word}</p>
          <p class="text-xs text-stone-400 mt-0.5">${item.category}</p>
        </div>
      `;
      card.addEventListener('click', () => openModal(item));
      grid.appendChild(card);
    });

    const overlay = document.getElementById('modal-overlay');
    const modalClose = document.getElementById('modal-close');
    const langToggleBtn = document.getElementById('modal-lang-toggle');
    const descElement = document.getElementById('modal-description');
    const tipWrap = document.getElementById('modal-tip-wrap');
    const tipElement = document.getElementById('modal-tip');

    let currentItem = null;
    let currentLang = 'EN';

    function openModal(item) {
      currentItem = item;
      currentLang = 'EN';
      
      document.getElementById('modal-icon').textContent = item.emoji;
      document.getElementById('modal-title').textContent = item.word;
      document.getElementById('modal-category').textContent = item.category;
      document.getElementById('modal-hand').textContent = item.hand;
      
      descElement.textContent = item.descEN;
      descElement.dir = "ltr";
      descElement.classList.remove("arabic-text");

      if (item.tipEN) {
        tipElement.textContent = item.tipEN;
        tipElement.dir = "ltr";
        tipElement.classList.remove("arabic-text");
        tipWrap.classList.remove('hidden');
      } else {
        tipWrap.classList.add('hidden');
      }

      langToggleBtn.textContent = "Translate to Arabic";
      overlay.classList.remove('hidden');
    }

    langToggleBtn.addEventListener('click', () => {
      if (currentLang === 'EN') {
        currentLang = 'AR';
        descElement.textContent = currentItem.descAR;
        descElement.dir = "rtl";
        descElement.classList.add("arabic-text");
        
        if (currentItem.tipAR) {
          tipElement.textContent = currentItem.tipAR;
          tipElement.dir = "rtl";
          tipElement.classList.add("arabic-text");
        }
        
        langToggleBtn.textContent = "Read in English";
      } else {
        currentLang = 'EN';
        descElement.textContent = currentItem.descEN;
        descElement.dir = "ltr";
        descElement.classList.remove("arabic-text");
        
        if (currentItem.tipEN) {
          tipElement.textContent = currentItem.tipEN;
          tipElement.dir = "ltr";
          tipElement.classList.remove("arabic-text");
        }
        
        langToggleBtn.textContent = "Translate to Arabic";
      }
    });

    function closeModal() { overlay.classList.add('hidden'); }
    modalClose.addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    async function injectComponent(id, file) {
      try {
        const res = await fetch(file);
        if (!res.ok) throw new Error();
        document.getElementById(id).innerHTML = await res.text();
      } catch(e) { console.warn('Could not load', file); }
    }
    injectComponent('navbar-placeholder', 'navbar.html');
    injectComponent('footer-placeholder', 'footer.html');
  </script>
</body>
</html>
