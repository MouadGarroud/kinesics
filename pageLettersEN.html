<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kinesics — English Letters (A–Z)</title>
  <link rel="stylesheet" href="/dist/style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    h1, h2, h3 { font-family: 'DM Serif Display', serif; }
    .arabic-text { font-family: 'Cairo', sans-serif; }

    .letter-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }
    .letter-card:hover {
      transform: scale(1.05);
      box-shadow: 0 16px 32px rgba(0,0,0,0.10);
    }

    #modal-overlay { transition: opacity 0.2s ease; }
    #modal-box { transition: transform 0.25s ease, opacity 0.25s ease; }
    #modal-overlay.hidden { pointer-events: none; }
    .hand-bg { background: linear-gradient(135deg, #f0fdfa, #ccfbf1); }
  </style>
</head>
<body class="bg-white text-stone-800 flex flex-col min-h-screen">

  <div id="navbar-placeholder"></div>

  <main class="flex-1">
    <section class="bg-stone-50 border-b border-stone-100 py-14 px-6 text-center">
      <span class="text-xs font-semibold uppercase tracking-widest text-teal-600">Fingerspelling</span>
      <h1 class="text-4xl md:text-5xl mt-3 text-stone-900">English Letters</h1>
      <p class="text-stone-500 mt-3 max-w-sm mx-auto text-sm leading-relaxed">Click any letter to see how to sign it in American Sign Language (ASL).</p>
    </section>

    <section class="max-w-6xl mx-auto px-6 py-16">
      <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-7 gap-4" id="letters-grid-en">
        </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <div id="modal-overlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
    <div id="modal-box" class="bg-white rounded-3xl shadow-2xl max-w-sm w-full p-8 relative flex flex-col">
      <button id="modal-close" class="absolute top-4 right-4 w-9 h-9 flex items-center justify-center rounded-full bg-stone-100 hover:bg-stone-200 transition-colors text-stone-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>

      <div class="text-center mb-6">
        <div id="modal-letter-big" class="text-7xl font-bold text-teal-600 mb-1" style="font-family:'DM Serif Display',serif;"></div>
        <p id="modal-letter-label" class="text-stone-500 text-sm font-medium"></p>
      </div>

      <div class="hand-bg rounded-2xl h-44 flex flex-col items-center justify-center mb-6 border border-teal-100">
        <div id="modal-hand-svg" class="text-6xl mb-2">🤚</div>
        <p class="text-xs text-teal-700 font-medium">Hand illustration</p>
      </div>

      <div class="flex justify-center mb-4">
        <button id="modal-lang-toggle" class="text-xs font-semibold px-4 py-1.5 bg-stone-100 text-stone-600 rounded-full hover:bg-teal-50 hover:text-teal-700 transition-colors">
          Translate to Arabic
        </button>
      </div>

      <p id="modal-description" class="text-sm text-stone-600 text-center leading-relaxed"></p>
    </div>
  </div>

  <script>
    const englishLetters = [
      { letter: 'A', emoji: '✊', descEN: 'Make a fist with your thumb resting on the side of your index finger.', descAR: 'اصنع قبضة بحيث يستقر إبهامك على جانب إصبعك السبابة.' },
      { letter: 'B', emoji: '🖐', descEN: 'Hold all four fingers straight up together, thumb tucked across the palm.', descAR: 'ارفع أصابعك الأربعة معاً بشكل مستقيم، واطوِ إبهامك داخل راحة اليد.' },
      { letter: 'C', emoji: '🤏', descEN: 'Curve your hand into a "C" shape with fingers and thumb.', descAR: 'قم بثني يدك لتشكل حرف "C" باستخدام أصابعك وإبهامك.' },
      { letter: 'D', emoji: '☝️', descEN: 'Touch your index finger to your thumb forming a circle; other fingers point up.', descAR: 'المس سبابتك بإبهامك لتشكيل دائرة؛ واجعل بقية الأصابع تشير للأعلى.' },
      { letter: 'E', emoji: '🤜', descEN: 'Curl all fingers down so the tips touch the thumb.', descAR: 'اثنِ جميع أصابعك للأسفل حتى تلامس أطرافها الإبهام.' },
      { letter: 'F', emoji: '👌', descEN: 'Touch your index finger and thumb to form a circle; other fingers spread out.', descAR: 'المس سبابتك بإبهامك لتشكيل دائرة؛ وافرد بقية الأصابع.' },
      { letter: 'G', emoji: '👈', descEN: 'Point index finger sideways with thumb parallel, other fingers curled.', descAR: 'أشر بإصبعك السبابة للجانب مع جعل الإبهام موازياً له، واطوِ بقية الأصابع.' },
      { letter: 'H', emoji: '🤙', descEN: 'Extend index and middle fingers together horizontally, thumb out.', descAR: 'مد إصبعي السبابة والوسطى معاً بشكل أفقي، واجعل الإبهام للخارج.' },
      { letter: 'I', emoji: '🤙', descEN: 'Hold up your pinky finger only with a closed fist.', descAR: 'ارفع إصبعك الخنصر فقط مع إغلاق قبضة يدك.' },
      { letter: 'J', emoji: '🤙', descEN: 'Sign "I" and draw a J in the air with your pinky.', descAR: 'قم بعمل إشارة "I" وارسم حرف J في الهواء بخنصرك.' },
      { letter: 'K', emoji: '✌️', descEN: 'Extend index and middle fingers up in a V, thumb between them.', descAR: 'مد إصبعي السبابة والوسطى للأعلى على شكل V، وضع الإبهام بينهما.' },
      { letter: 'L', emoji: '🤙', descEN: 'Extend thumb and index finger to form an L shape.', descAR: 'مد الإبهام والسبابة لتشكيل حرف L.' },
      { letter: 'M', emoji: '✊', descEN: 'Tuck index, middle, and ring fingers over the thumb.', descAR: 'اطوِ أصابع السبابة والوسطى والبنصر فوق الإبهام.' },
      { letter: 'N', emoji: '✊', descEN: 'Tuck index and middle fingers over the thumb.', descAR: 'اطوِ إصبعي السبابة والوسطى فوق الإبهام.' },
      { letter: 'O', emoji: '👌', descEN: 'Form a circle with all fingers and thumb touching at the tips.', descAR: 'شكل دائرة بلمس أطراف جميع الأصابع بالإبهام.' },
      { letter: 'P', emoji: '👇', descEN: 'Similar to K but point downward with middle finger.', descAR: 'مشابه لحرف K ولكن أشر للأسفل بإصبعك الوسطى.' },
      { letter: 'Q', emoji: '👇', descEN: 'Similar to G but point downward.', descAR: 'مشابه لحرف G ولكن أشر للأسفل.' },
      { letter: 'R', emoji: '🤞', descEN: 'Cross your index and middle fingers.', descAR: 'قاطع إصبعي السبابة والوسطى.' },
      { letter: 'S', emoji: '✊', descEN: 'Make a fist with your thumb resting across the front of your fingers.', descAR: 'اصنع قبضة بحيث يستقر إبهامك بشكل عرضي أمام أصابعك.' },
      { letter: 'T', emoji: '✊', descEN: 'Tuck thumb between index and middle fingers.', descAR: 'ضع إبهامك بين إصبعي السبابة والوسطى.' },
      { letter: 'U', emoji: '✌️', descEN: 'Hold index and middle fingers together pointing up.', descAR: 'ضم إصبعي السبابة والوسطى معاً وأشر بهما للأعلى.' },
      { letter: 'V', emoji: '✌️', descEN: 'Extend index and middle fingers apart to form a V shape.', descAR: 'مد إصبعي السبابة والوسطى وباعد بينهما لتشكيل حرف V.' },
      { letter: 'W', emoji: '🤟', descEN: 'Extend index, middle, and ring fingers spread apart.', descAR: 'مد أصابع السبابة والوسطى والبنصر وباعد بينها.' },
      { letter: 'X', emoji: '☝️', descEN: 'Curve/hook your index finger like a small hook.', descAR: 'اثنِ/اعقف إصبعك السبابة كخطاف صغير.' },
      { letter: 'Y', emoji: '🤙', descEN: 'Extend pinky and thumb out, other fingers folded.', descAR: 'مد الخنصر والإبهام للخارج، واطوِ بقية الأصابع.' },
      { letter: 'Z', emoji: '☝️', descEN: 'Trace a Z in the air with your index finger.', descAR: 'ارسم حرف Z في الهواء باستخدام سبابتك.' },
    ];

    const grid = document.getElementById('letters-grid-en');
    englishLetters.forEach((item, i) => {
      const card = document.createElement('div');
      card.className = 'letter-card bg-stone-50 border border-stone-100 rounded-2xl flex flex-col items-center justify-center py-6 gap-1 select-none';
      card.innerHTML = `
        <span class="text-3xl font-bold text-teal-600" style="font-family:'DM Serif Display',serif;">${item.letter}</span>
        <span class="text-xs text-stone-400 font-medium">Letter ${i + 1}</span>
      `;
      card.addEventListener('click', () => openModal(item));
      grid.appendChild(card);
    });

    const overlay = document.getElementById('modal-overlay');
    const modalClose = document.getElementById('modal-close');
    const langToggleBtn = document.getElementById('modal-lang-toggle');
    const descElement = document.getElementById('modal-description');
    
    let currentItem = null;
    let currentLang = 'EN';

    function openModal(item) {
      currentItem = item;
      currentLang = 'EN';
      
      document.getElementById('modal-letter-big').textContent = item.letter;
      document.getElementById('modal-letter-label').textContent = `ASL — Letter ${item.letter}`;
      document.getElementById('modal-hand-svg').textContent = item.emoji;
      
      descElement.textContent = item.descEN;
      descElement.dir = "ltr";
      descElement.classList.remove("arabic-text");
      langToggleBtn.textContent = "Translate to Arabic";
      
      overlay.classList.remove('hidden');
    }

    langToggleBtn.addEventListener('click', () => {
      if (currentLang === 'EN') {
        currentLang = 'AR';
        descElement.textContent = currentItem.descAR;
        descElement.dir = "rtl";
        descElement.classList.add("arabic-text");
        langToggleBtn.textContent = "Read in English";
      } else {
        currentLang = 'EN';
        descElement.textContent = currentItem.descEN;
        descElement.dir = "ltr";
        descElement.classList.remove("arabic-text");
        langToggleBtn.textContent = "Translate to Arabic";
      }
    });

    function closeModal() { overlay.classList.add('hidden'); }
    modalClose.addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    async function injectComponent(id, file) {
      try {
        const res = await fetch(file);
        if (!res.ok) throw new Error();
        document.getElementById(id).innerHTML = await res.text();
      } catch(e) { console.warn('Could not load', file); }
    }
    injectComponent('navbar-placeholder', 'navbar.html');
    injectComponent('footer-placeholder', 'footer.html');
  </script>
</body>
</html>
